<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: #666;
        }

        .remember-me input {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            background: #fafafa;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 15px;
        }

        .spinner {
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="logo">📚</div>
                <h1>EduBot</h1>
                <p>Your AI Education Assistant</p>
            </div>

            <div class="form-container">
                <div class="error-message" id="errorMessage"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter access password"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" style="margin-bottom: 0;">Remember me</label>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        Access EduBot
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="footer">
                <strong>Demo Password:</strong> EduBot2026
            </div>
        </div>
    </div>

    <script>
        // ======= CONFIGURATION =======
        // Replace this with your actual EduBot Chat URL from n8n
        const EDUBOT_CHAT_URL = 'https://edubot-login.onrender.com';
        
        // Password for accessing EduBot
        const CORRECT_PASSWORD = 'EduBot2026';
        // ======= END CONFIGURATION =======

        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const loginBtn = document.getElementById('loginBtn');
        const rememberCheckbox = document.getElementById('remember');

        // Check if user is already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('edubot_logged_in') === 'true') {
                redirectToChat();
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            const password = passwordInput.value.trim();

            // Hide error message
            errorMessage.classList.remove('show');

            // Show loading
            loading.style.display = 'block';
            loginBtn.disabled = true;

            // Simulate network delay
            setTimeout(() => {
                if (password === CORRECT_PASSWORD) {
                    // Store login status if "Remember me" is checked
                    if (rememberCheckbox.checked) {
                        localStorage.setItem('edubot_logged_in', 'true');
                    }

                    // Store session
                    sessionStorage.setItem('edubot_authenticated', 'true');

                    // Redirect to chat
                    redirectToChat();
                } else {
                    // Show error
                    loading.style.display = 'none';
                    loginBtn.disabled = false;
                    errorMessage.textContent = '❌ Invalid password. Try again!';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 800);
        }

        function redirectToChat() {
            // Add timestamp to prevent caching
            const timestamp = new Date().getTime();
            window.location.href = EDUBOT_CHAT_URL + '?t=' + timestamp;
        }

        // Allow Enter key to submit
        passwordInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // Prevent form submission if password is empty
        loginForm.addEventListener('submit', (event) => {
            if (!passwordInput.value.trim()) {
                event.preventDefault();
                passwordInput.focus();
            }
        });

        // Auto-focus password input
        window.addEventListener('load', () => {
            passwordInput.focus();
        });
    </script>
</body>
</html>
